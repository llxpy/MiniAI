<!-- MiniAI/python-caller/chat.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量级AI助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .chat-header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        .chat-messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .message {
            margin-bottom: 15px;
            max-width: 80%;
        }
        .user-message {
            margin-left: auto;
            background-color: #3498db;
            color: white;
            padding: 10px 15px;
            border-radius: 15px 15px 0 15px;
        }
        .ai-message {
            margin-right: auto;
            background-color: #ecf0f1;
            color: #2c3e50;
            padding: 10px 15px;
            border-radius: 15px 15px 15px 0;
        }
        .message-time {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
            text-align: right;
        }
        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid #eee;
        }
        #question-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
        }
        #send-btn {
            margin-left: 10px;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        #send-btn:hover {
            background-color: #2980b9;
        }
        .loading {
            color: #7f8c8d;
            font-style: italic;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">轻量级AI助手（自带记忆库）</div>
        <div class="chat-messages" id="chat-messages">
            <!-- 初始欢迎消息 -->
            <div class="message ai-message">
                你好！我是AI助手，有什么问题可以问我～
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="question-input" placeholder="输入你的问题...">
            <button id="send-btn">发送</button>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const chatMessages = document.getElementById("chat-messages");
        const questionInput = document.getElementById("question-input");
        const sendBtn = document.getElementById("send-btn");

        // 添加消息到页面
        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${isUser ? "user-message" : "ai-message"}`;
            messageDiv.innerHTML = content.replace(/\n/g, "<br>");
            
            // 添加时间
            const timeDiv = document.createElement("div");
            timeDiv.className = "message-time";
            const now = new Date();
            timeDiv.textContent = now.toLocaleTimeString();
            messageDiv.appendChild(timeDiv);
            
            chatMessages.appendChild(messageDiv);
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 发送消息
        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question) return;

            // 添加用户消息
            addMessage(question, true);
            questionInput.value = "";

            // 添加加载提示
            const loadingDiv = document.createElement("div");
            loadingDiv.className = "loading";
            loadingDiv.textContent = "AI正在思考...";
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // 调用后端API
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ question: question })
                });

                const result = await response.json();
                // 移除加载提示
                chatMessages.removeChild(loadingDiv);
                // 添加AI回答
                addMessage(result.answer);
            } catch (error) {
                chatMessages.removeChild(loadingDiv);
                addMessage("抱歉，回答失败了：" + error.message);
            }
        }

        // 绑定事件
        sendBtn.addEventListener("click", sendMessage);
        questionInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        // 加载历史记录（可选）
        async function loadHistory() {
            try {
                const response = await fetch("/history");
                const history = await response.json();
                if (history.length > 0) {
                    addMessage("以下是你的历史对话：", false);
                    history.forEach(h => {
                        addMessage(h.question, true);
                        addMessage(h.answer, false);
                    });
                }
            } catch (error) {
                console.log("加载历史记录失败：", error);
            }
        }

        // 页面加载完成后加载历史记录
        window.onload = loadHistory;
    </script>
</body>
</html>
